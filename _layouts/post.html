---
layout: default
title: Blog
---

<div class="blog-wrap">
  <h2><i class="fas fa-newspaper"></i> Blog & Longform</h2>
  
  <div class="liquid-blog-container">
    <!-- THIS IS YOUR LIQUID LOOP - Reads from _posts folder on GitHub -->
    {% for post in site.posts %}
    <div class="liquid-post-card" style="margin-bottom: 40px;">
      <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <p class="post-date" style="color: gray;">{{ post.date | date: "%B %d, %Y" }}</p>
      <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
      <a href="{{ post.url }}" class="read-more">Read more →</a>
    </div>
    {% endfor %}
  </div>
</div>
