<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10,000+ Math Questions – All Domains</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f8;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 960px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 24px 28px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
        }
        h1 {
            font-size: 26px;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .badge {
            background: #1a5276;
            color: white;
            font-size: 13px;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 500;
        }
        .stats {
            display: flex;
            gap: 16px 28px;
            flex-wrap: wrap;
            background: #f0f4f8;
            padding: 12px 18px;
            border-radius: 16px;
            margin: 10px 0 16px;
            font-size: 14px;
        }
        .stats span strong {
            color: #0b1e33;
        }
        .qbox {
            background: #fafcff;
            border: 1px solid #dce5f0;
            border-radius: 20px;
            padding: 20px 22px;
            margin-bottom: 18px;
        }
        .qbox .qtext {
            font-size: 19px;
            font-weight: 600;
            color: #0b1e33;
            margin: 8px 0 4px;
        }
        .qbox .qdomain {
            font-size: 12px;
            color: #4e6685;
            background: #e3ecf9;
            display: inline-block;
            padding: 2px 14px;
            border-radius: 30px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .qbox .qdifficulty {
            font-size: 12px;
            color: #7a8fa8;
            margin-left: 10px;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 14px;
            margin: 12px 0 14px;
        }
        .options button {
            background: white;
            border: 2px solid #dce5f0;
            border-radius: 14px;
            padding: 10px 14px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            color: #0b1e33;
        }
        .options button:hover:not(:disabled) {
            background: #eef3fa;
            border-color: #2a5298;
        }
        .options button.correct {
            background: #d5f5e3;
            border-color: #1a7a3a;
        }
        .options button.wrong {
            background: #fadbd8;
            border-color: #922b21;
        }
        .options button:disabled {
            cursor: default;
            opacity: 0.8;
        }
        .answer-box {
            background: #f0f4f8;
            padding: 12px 16px;
            border-radius: 14px;
            margin-top: 10px;
            font-size: 15px;
            display: none;
        }
        .answer-box.show {
            display: block;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .btn {
            background: #eef3fa;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: #0b1e33;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-primary {
            background: #1a5276;
            color: white;
        }
        .btn-primary:hover {
            background: #0f3b55;
        }
        .btn-success {
            background: #1a7a3a;
            color: white;
        }
        .btn-success:hover {
            background: #135e2b;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #dce5f0;
        }
        .btn-outline:hover {
            background: #eef3fa;
        }
        .btn-danger {
            background: #922b21;
            color: white;
        }
        .btn-danger:hover {
            background: #6e2018;
        }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #7a8fa8;
            margin-top: 16px;
            border-top: 1px solid #dce5f0;
            padding-top: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footer .streak {
            color: #1a7a3a;
            font-weight: 700;
        }
        @media (max-width: 600px) {
            .options {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 16px;
            }
            .footer {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>
            <span>📚 10,000+ Math Questions</span>
            <span class="badge" id="domainBadge">All Domains</span>
        </h1>
        <div class="stats">
            <span>📌 #<strong id="qIndex">1</strong> / <strong id="qTotal">10000</strong></span>
            <span>✅ Correct: <strong id="correctCount">0</strong></span>
            <span>❌ Wrong: <strong id="wrongCount">0</strong></span>
            <span>📊 Score: <strong id="scorePercent">0%</strong></span>
            <span>🔥 Streak: <strong id="streakCount">0</strong></span>
            <span>⏱️ <strong id="timerDisplay">00:00</strong></span>
        </div>

        <div class="qbox" id="questionBox">
            <div>
                <span class="qdomain" id="qDomain">Loading...</span>
                <span class="qdifficulty" id="qDifficulty">⚪ Easy</span>
            </div>
            <div class="qtext" id="qText">Loading question...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="answer-box" id="answerBox">
                <strong>✔ Correct Answer:</strong> <span id="correctAnswerText"></span>
                <span style="margin-left:16px;color:#4e6685;font-size:14px;" id="explanationText"></span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="nextBtn">Next →</button>
            <button class="btn btn-outline" id="showAnsBtn">Show Answer</button>
            <button class="btn btn-success" id="exportBtn">📥 Export CSV</button>
            <button class="btn btn-danger" id="resetBtn">🔄 Reset</button>
        </div>
        <div class="footer">
            <span id="progressText">0 / 10000 answered</span>
            <span class="streak" id="streakLabel">🔥 Streak: 0</span>
            <span>⏱️ <span id="timerFooter">00:00</span></span>
        </div>
    </div>

    <script>
        // ================================================================
        //  1. QUESTION GENERATOR – 11 DOMAINS × INFINITE VARIATIONS
        // ================================================================

        const DOMAINS = [
            'Arithmetic', 'Algebra', 'Geometry', 'Mensuration', 'Trigonometry',
            'Calculus', 'Linear Algebra', 'Differential Equations',
            'Discrete Math', 'Number Theory', 'Complex Analysis'
        ];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function gcd(a, b) { while (b) { [a, b] = [b, a % b]; } return a; }

        function generateOptions(correct) {
            let opts = new Set();
            opts.add(correct);
            let attempts = 0;
            while (opts.size < 4 && attempts < 300) {
                let offset = Math.floor(Math.random() * 30) - 15;
                if (offset === 0) offset = 1 + Math.floor(Math.random() * 3);
                let val;
                if (typeof correct === 'number') {
                    val = Math.round((correct + offset) * 100) / 100;
                    if (Number.isInteger(correct) && !Number.isInteger(val)) val = Math.round(val);
                } else {
                    val = correct + offset;
                }
                if (val !== correct && !isNaN(val)) opts.add(val);
                attempts++;
            }
            let arr = Array.from(opts);
            while (arr.length < 4) arr.push(arr[0] + 1 + arr.length);
            return shuffleArray(arr);
        }

        // -------- GENERATORS (each returns a question object) --------

        function genArithmetic() {
            const a = Math.floor(Math.random() * 30) + 1;
            const b = Math.floor(Math.random() * 30) + 1;
            const ops = ['+', '-', '×', '÷'];
            const op = ops[Math.floor(Math.random() * 4)];
            let question, answer, explanation;
            if (op === '+') { answer = a + b;
                question = `${a} + ${b} = ?`;
                explanation = `Add ${a} and ${b}`; } else if (op === '-') { answer = a + b;
                question = `${a+b} - ${b} = ?`;
                explanation = `Subtract ${b} from ${a+b}`; } else if (op === '×') { answer = a * b;
                question = `${a} × ${b} = ?`;
                explanation = `Multiply ${a} and ${b}`; } else { const c = a * b;
                answer = a;
                question = `${c} ÷ ${b} = ?`;
                explanation = `Divide ${c} by ${b}`; }
            return { domain: 'Arithmetic', question, options: generateOptions(answer), correct: answer, explanation,
            difficulty: answer < 20 ? 'Easy' : answer < 100 ? 'Medium' : 'Hard' };
        }

        function genAlgebra() {
            const x = Math.floor(Math.random() * 15) + 1;
            const a = Math.floor(Math.random() * 8) + 1;
            const b = Math.floor(Math.random() * 15) + 1;
            const ans = a * x + b;
            const question = `Solve: ${a}x + ${b} = ${ans}`;
            return { domain: 'Algebra', question, options: generateOptions(x), correct: x, explanation: `x = (${ans}-${b})/${a}`,
                difficulty: x < 5 ? 'Easy' : x < 12 ? 'Medium' : 'Hard' };
        }

        function genGeometry() {
            const s = Math.floor(Math.random() * 15) + 2;
            const area = s * s;
            const question = `Area of square with side ${s}?`;
            return { domain: 'Geometry', question, options: generateOptions(area), correct: area,
                explanation: `A = ${s}² = ${area}`, difficulty: s < 6 ? 'Easy' : s < 12 ? 'Medium' : 'Hard' };
        }

        function genMensuration() {
            const r = Math.floor(Math.random() * 10) + 2;
            const vol = Math.round((4 / 3) * 3.14159 * r * r * r * 100) / 100;
            const question = `Volume of sphere (r=${r}, π≈3.14)?`;
            return { domain: 'Mensuration', question, options: generateOptions(vol), correct: vol,
                explanation: `V = 4/3 × π × ${r}³ = ${vol}`, difficulty: r < 5 ? 'Easy' : r < 9 ? 'Medium' : 'Hard' };
        }

        function genTrigonometry() {
            const angles = [0, 30, 45, 60, 90];
            const a = angles[Math.floor(Math.random() * angles.length)];
            const val = Math.round(Math.sin(a * Math.PI / 180) * 100) / 100;
            const question = `sin(${a}°) = ?`;
            return { domain: 'Trigonometry', question, options: generateOptions(val), correct: val,
                explanation: `sin(${a}°) = ${val}`, difficulty: a < 30 ? 'Easy' : a < 60 ? 'Medium' : 'Hard' };
        }

        function genCalculus() {
            const a = Math.floor(Math.random() * 7) + 1;
            const ans = a * 2;
            const question = `Derivative of ${a}x² at x=1?`;
            return { domain: 'Calculus', question, options: generateOptions(ans), correct: ans,
                explanation: `d/dx(${a}x²) = ${a*2}x, at x=1 → ${ans}`,
            difficulty: a < 3 ? 'Easy' : a < 6 ? 'Medium' : 'Hard' };
        }

        function genLinearAlgebra() {
            const a = Math.floor(Math.random() * 6) + 1;
            const b = Math.floor(Math.random() * 6) + 1;
            const c = Math.floor(Math.random() * 6) + 1;
            const d = Math.floor(Math.random() * 6) + 1;
            const det = a * d - b * c;
            const question = `det([[${a},${b}],[${c},${d}]]) = ?`;
            return { domain: 'Linear Algebra', question, options: generateOptions(det), correct: det,
                explanation: `det = ${a}×${d} - ${b}×${c} = ${det}`,
            difficulty: Math.abs(det) < 10 ? 'Easy' : Math.abs(det) < 30 ? 'Medium' : 'Hard' };
        }

        function genDiffEq() {
            const c = Math.floor(Math.random() * 5) + 1;
            const ans = Math.round(Math.exp(c) * 100) / 100;
            const question = `Solve dy/dx = ${c}y, y(0)=1 at x=1 (e≈2.718)?`;
            return { domain: 'Differential Equations', question, options: generateOptions(ans), correct: ans,
                explanation: `y = e^(${c}x), at x=1 → e^${c} = ${ans}`,
            difficulty: c < 3 ? 'Easy' : 'Medium' };
        }

        function genDiscreteMath() {
            const a = Math.floor(Math.random() * 7) + 2;
            const b = Math.floor(Math.random() * 7) + 2;
            const ans = a * b;
            const question = `Edges in complete bipartite K_{${a},${b}}?`;
            return { domain: 'Discrete Math', question, options: generateOptions(ans), correct: ans,
                explanation: `|E| = ${a}×${b} = ${ans}`, difficulty: a + b < 8 ? 'Easy' : a + b < 14 ? 'Medium' : 'Hard' };
        }

        function genNumberTheory() {
            const a = Math.floor(Math.random() * 30) + 2;
            const b = Math.floor(Math.random() * 30) + 2;
            const ans = gcd(a, b);
            const question = `gcd(${a}, ${b}) = ?`;
            return { domain: 'Number Theory', question, options: generateOptions(ans), correct: ans,
                explanation: `gcd(${a},${b}) = ${ans}`, difficulty: ans < 3 ? 'Easy' : ans < 8 ? 'Medium' : 'Hard' };
        }

        function genComplexAnalysis() {
            const a = Math.floor(Math.random() * 8) + 1;
            const b = Math.floor(Math.random() * 8) + 1;
            const ans = a * a + b * b;
            const question = `|${a} + ${b}i|² = ?`;
            return { domain: 'Complex Analysis', question, options: generateOptions(ans), correct: ans,
                explanation: `|${a}+${b}i|² = ${a}²+${b}² = ${ans}`,
            difficulty: ans < 20 ? 'Easy' : ans < 60 ? 'Medium' : 'Hard' };
        }

        const generators = [
            genArithmetic, genAlgebra, genGeometry, genMensuration, genTrigonometry,
            genCalculus, genLinearAlgebra, genDiffEq, genDiscreteMath,
            genNumberTheory, genComplexAnalysis
        ];

        function generateQuestion() {
            const gen = generators[Math.floor(Math.random() * generators.length)];
            return gen();
        }

        // ================================================================
        //  2. APP STATE
        // ================================================================

        let currentQuestion = null;
        let currentIndex = 0;
        const TOTAL_QUESTIONS = 10000;
        let correctTotal = 0;
        let wrongTotal = 0;
        let streak = 0;
        let maxStreak = 0;
        let answered = new Set();
        let timerSeconds = 0;
        let timerInterval = null;
        let isAnswered = false;

        // DOM refs
        const qText = document.getElementById('qText');
        const qDomain = document.getElementById('qDomain');
        const qDifficulty = document.getElementById('qDifficulty');
        const optionsContainer = document.getElementById('optionsContainer');
        const answerBox = document.getElementById('answerBox');
        const correctAnswerText = document.getElementById('correctAnswerText');
        const explanationText = document.getElementById('explanationText');
        const qIndex = document.getElementById('qIndex');
        const qTotal = document.getElementById('qTotal');
        const correctCount = document.getElementById('correctCount');
        const wrongCount = document.getElementById('wrongCount');
        const scorePercent = document.getElementById('scorePercent');
        const streakCount = document.getElementById('streakCount');
        const streakLabel = document.getElementById('streakLabel');
        const progressText = document.getElementById('progressText');
        const domainBadge = document.getElementById('domainBadge');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerFooter = document.getElementById('timerFooter');

        // -------- TIMER --------
        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                timerSeconds++;
                const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                const s = String(timerSeconds % 60).padStart(2, '0');
                const t = `${m}:${s}`;
                timerDisplay.textContent = t;
                timerFooter.textContent = t;
            }, 1000);
        }

        // -------- RENDER --------
        function renderQuestion() {
            currentQuestion = generateQuestion();
            isAnswered = false;
            qText.textContent = currentQuestion.question;
            qDomain.textContent = currentQuestion.domain;
            qDifficulty.textContent = ['⚪ Easy', '🟡 Medium', '🔴 Hard'][
                ['Easy', 'Medium', 'Hard'].indexOf(currentQuestion.difficulty) || 0
            ];
            domainBadge.textContent = currentQuestion.domain;

            optionsContainer.innerHTML = '';
            currentQuestion.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.dataset.value = opt;
                btn.addEventListener('click', () => handleAnswer(btn));
                optionsContainer.appendChild(btn);
            });

            answerBox.classList.remove('show');
            correctAnswerText.textContent = '';
            explanationText.textContent = '';

            qIndex.textContent = (currentIndex % TOTAL_QUESTIONS) + 1;
            qTotal.textContent = TOTAL_QUESTIONS;
            updateStats();

            if (!timerInterval) startTimer();
        }

        // -------- ANSWER --------
        function handleAnswer(btn) {
            if (isAnswered) return;
            const selected = parseFloat(btn.dataset.value);
            const correct = currentQuestion.correct;
            const isCorrect = Math.abs(selected - correct) < 0.001;

            const btns = optionsContainer.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            btns.forEach(b => {
                const val = parseFloat(b.dataset.value);
                if (Math.abs(val - correct) < 0.001) b.classList.add('correct');
                if (b === btn && !isCorrect) b.classList.add('wrong');
            });

            if (isCorrect) {
                correctTotal++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
            } else {
                wrongTotal++;
                streak = 0;
            }

            isAnswered = true;
            answered.add(currentIndex);
            showAnswer();
            updateStats();
        }

        function showAnswer() {
            correctAnswerText.textContent = currentQuestion.correct;
            explanationText.textContent = currentQuestion.explanation || '';
            answerBox.classList.add('show');
        }

        function updateStats() {
            const total = correctTotal + wrongTotal;
            correctCount.textContent = correctTotal;
            wrongCount.textContent = wrongTotal;
            scorePercent.textContent = total ? Math.round((correctTotal / total) * 100) + '%' : '0%';
            streakCount.textContent = streak;
            streakLabel.textContent = `🔥 Streak: ${streak} (max: ${maxStreak})`;
            progressText.textContent = `${total} / ${TOTAL_QUESTIONS} answered`;
        }

        // -------- NAVIGATION --------
        function nextQuestion() {
            if (!isAnswered) {
                alert('Please answer the current question first.');
                return;
            }
            currentIndex = (currentIndex + 1) % TOTAL_QUESTIONS;
            renderQuestion();
        }

        // -------- RESET --------
        function resetAll() {
            if (!confirm('Reset all progress?')) return;
            correctTotal = 0;
            wrongTotal = 0;
            streak = 0;
            maxStreak = 0;
            answered = new Set();
            currentIndex = 0;
            timerSeconds = 0;
            if (timerInterval) { clearInterval(timerInterval);
                timerInterval = null; }
            renderQuestion();
            startTimer();
            updateStats();
        }

        // -------- EXPORT CSV --------
        function exportCSV() {
            // Generate 100 questions as sample export
            const headers = ['Domain', 'Question', 'Correct Answer', 'Difficulty'];
            const rows = [];
            for (let i = 0; i < 100; i++) {
                const q = generateQuestion();
                rows.push([q.domain, q.question, q.correct, q.difficulty]);
            }
            const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${v}"`).join(','))].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `math_questions_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ Exported 100 sample questions as CSV!');
        }

        // ================================================================
        //  3. INIT
        // ================================================================

        renderQuestion();
        startTimer();

        document.getElementById('nextBtn').addEventListener('click', nextQuestion);
        document.getElementById('showAnsBtn').addEventListener('click', () => {
            if (!isAnswered) {
                alert('Please answer the question first.');
            } else {
                showAnswer();
            }
        });
        document.getElementById('resetBtn').addEventListener('click', resetAll);
        document.getElementById('exportBtn').addEventListener('click', exportCSV);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextQuestion();
            }
        });
    </script>
</body>
</html>
